<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="herae-memories-site" content="1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Herae Memories — Contacts</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <a class="brand-link" href="memories.html" aria-label="Herae Memories — home">
      <img src="logo.png" alt="Herae" class="brand-logo">
      <span class="brand-sub">Your contacts</span>
    </a>
    <nav class="nav-links">
      <a href="memories.html" class="nav-link">Feed</a>
      <a href="contacts.html" class="nav-link nav-link-active">Contacts</a>
    </nav>
    <div class="topbar-right">
      <button class="btn btn-ghost" id="searchTrigger" aria-label="Search">🔍 Search</button>
      <span class="who" id="whoAmI"></span>
      <button class="btn btn-ghost" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div class="page-wrap page-wrap-narrow">
    <div class="page-title">Contacts</div>
    <div class="page-sub">Tap someone to open their profile and see what they've shared.</div>

    <div class="add-contact-card">
      <div class="section-title">Add a contact</div>
      <form class="add-contact-row" id="addContactForm">
        <input type="text" id="addContactInput" placeholder="Their username" autocomplete="off" maxlength="64">
        <button type="submit" class="btn btn-primary" id="addContactBtn">Send request</button>
      </form>
      <div class="add-contact-msg" id="addContactMsg"></div>
    </div>

    <div id="requests"></div>

    <div class="contacts-list-head">
      <div class="section-title" id="contactsHeading">Your contacts</div>
      <input type="text" id="contactSearch" class="contacts-search" placeholder="🔍 Search contacts…" autocomplete="off">
    </div>

    <div id="content">
      <div class="spinner-text">Loading contacts…</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script type="module" src="/src/pages/contacts.js"></script>
</body>
</html>
