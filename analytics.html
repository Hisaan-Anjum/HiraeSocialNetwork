<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="herae-memories-site" content="1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analytics — Herae Admin</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
<style>
  /* ── Analytics dashboard — self-contained, admin only. Palette validated for
       the dark surface (dataviz): purple #8b5cf6, amber, sky, pink. ── */
  :root {
    --c-purple: #8b5cf6; --c-amber: #d99a2b; --c-sky: #2f9fd0; --c-pink: #db5fa0; --c-green: #4ade80;
  }
  .an-wrap { max-width: 1200px; margin: 0 auto; padding: 26px 22px 80px; }
  .an-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
  .an-title { font-size: 27px; }
  .an-sub { color: var(--ink-faint); font-size: 13px; margin-bottom: 26px; }
  .an-section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700;
    color: var(--ink-dim); margin: 34px 0 14px; display: flex; align-items: center; gap: 10px;
  }
  .an-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .an-grid { display: grid; gap: 14px; }
  .cols-6 { grid-template-columns: repeat(6, 1fr); }
  .cols-4 { grid-template-columns: repeat(4, 1fr); }
  .cols-3 { grid-template-columns: repeat(3, 1fr); }
  .cols-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 900px) { .cols-6 { grid-template-columns: repeat(3,1fr); } .cols-4 { grid-template-columns: repeat(2,1fr); } .cols-3,.cols-2 { grid-template-columns: 1fr; } }
  @media (max-width: 560px) { .cols-6 { grid-template-columns: repeat(2,1fr); } }

  .card {
    background: linear-gradient(175deg, var(--card), var(--bg-1));
    border: 1px solid var(--border); border-radius: 16px; padding: 18px 18px;
  }
  .kpi .kpi-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-faint); font-weight: 700; }
  .kpi .kpi-value { font-size: 30px; font-weight: 800; margin-top: 6px; line-height: 1; font-family: Georgia, serif; }
  .kpi .kpi-sub { font-size: 12px; color: var(--ink-dim); margin-top: 7px; }
  .kpi .kpi-value.accent { background: linear-gradient(140deg, var(--gold), var(--purple)); -webkit-background-clip: text; background-clip: text; color: transparent; }

  .chart-card h3 { font-size: 14px; margin-bottom: 2px; }
  .chart-card .chart-total { font-size: 12px; color: var(--ink-faint); margin-bottom: 10px; }
  .chart { position: relative; }
  .chart svg { display: block; width: 100%; height: auto; overflow: visible; }
  .chart-tip {
    position: absolute; pointer-events: none; opacity: 0; transform: translate(-50%, -120%);
    background: #0d0b12; border: 1px solid var(--border); border-radius: 8px; padding: 5px 9px;
    font-size: 12px; white-space: nowrap; z-index: 3; transition: opacity 0.08s;
  }
  .chart-tip b { color: var(--ink); } .chart-tip span { color: var(--ink-faint); }
  .chart-dot { position: absolute; width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--bg-0); pointer-events: none; opacity: 0; transform: translate(-50%,-50%); }

  /* Horizontal bars (funnel, ratings, events, breakdowns) */
  .bar-row { display: grid; grid-template-columns: 150px 1fr auto; align-items: center; gap: 12px; margin: 9px 0; }
  .bar-row .bar-label { font-size: 13px; color: var(--ink-dim); }
  .bar-track { height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
  .bar-row .bar-val { font-size: 13px; font-weight: 700; color: var(--ink); text-align: right; min-width: 74px; }
  .bar-row .bar-val small { color: var(--ink-faint); font-weight: 500; }
  @media (max-width: 560px) { .bar-row { grid-template-columns: 96px 1fr auto; } }

  .stat-line { display: flex; align-items: baseline; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .stat-line:last-child { border-bottom: none; }
  .stat-line .sl-label { color: var(--ink-dim); font-size: 13.5px; }
  .stat-line .sl-value { font-weight: 700; font-size: 15px; }

  .an-state { text-align: center; padding: 90px 20px; color: var(--ink-faint); }
  .an-state .icon { font-size: 44px; margin-bottom: 14px; }
  .an-refresh-note { font-size: 12px; color: var(--ink-faint); }
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand-link" href="memories.html" aria-label="Herae — home">
      <img src="logo.png" alt="Herae" class="brand-logo">
      <span class="brand-sub">Admin · Analytics</span>
    </a>
    <nav class="nav-links">
      <a href="memories.html" class="nav-link">Feed</a>
      <a href="admin.html" class="nav-link">Recommendations</a>
      <a href="analytics.html" class="nav-link nav-link-active">Analytics</a>
    </nav>
    <div class="topbar-right">
      <span class="who" id="whoAmI"></span>
      <button class="btn btn-ghost" id="refreshBtn">↻ Refresh</button>
      <button class="btn btn-ghost" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div class="an-wrap">
    <div class="an-head">
      <div>
        <div class="an-title">Analytics</div>
      </div>
      <div class="an-refresh-note" id="genAt"></div>
    </div>
    <div class="an-sub">First-party product metrics — computed live from the database, never shared with a third party.</div>
    <div id="app"><div class="an-state"><div class="icon">📊</div>Loading analytics…</div></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
  'use strict';
  (function () {
    const auth = requireAuth();
    if (!auth) return;
    document.getElementById('whoAmI').textContent = `logged in as ${auth.username}`;
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('refreshBtn').addEventListener('click', load);

    const app = document.getElementById('app');
    const fmt = (n) => (n == null ? '—' : Number(n).toLocaleString('en-US'));
    const pct = (n) => `${n == null ? 0 : n}%`;
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    // ── SVG area chart with a hover crosshair (dataviz: single series → no
    //    legend, title names it; hover layer on by default). ──
    function areaChart(id, series, color) {
      const W = 640, H = 120, PADT = 8, PADB = 4;
      const n = series.length;
      const max = Math.max(1, ...series.map((p) => p.n));
      const X = (i) => (n <= 1 ? 0 : (i / (n - 1)) * W);
      const Y = (v) => H - PADB - (v / max) * (H - PADT - PADB);
      const line = series.map((p, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)},${Y(p.n).toFixed(1)}`).join(' ');
      const area = `M0,${H} ` + series.map((p, i) => `L${X(i).toFixed(1)},${Y(p.n).toFixed(1)}`).join(' ') + ` L${W},${H} Z`;
      return `
        <div class="chart" data-chart="${id}">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
            <defs><linearGradient id="g-${id}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="${color}" stop-opacity="0.34"/>
              <stop offset="1" stop-color="${color}" stop-opacity="0"/>
            </linearGradient></defs>
            <path d="${area}" fill="url(#g-${id})"/>
            <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
          </svg>
          <div class="chart-dot" style="background:${color}"></div>
          <div class="chart-tip"></div>
        </div>`;
    }

    function wireChart(id, series, color) {
      const box = app.querySelector(`[data-chart="${id}"]`);
      if (!box) return;
      const dot = box.querySelector('.chart-dot');
      const tip = box.querySelector('.chart-tip');
      const n = series.length;
      const max = Math.max(1, ...series.map((p) => p.n));
      box.addEventListener('mousemove', (e) => {
        const r = box.getBoundingClientRect();
        const rel = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
        const i = Math.round(rel * (n - 1));
        const p = series[i];
        const px = (n <= 1 ? 0 : i / (n - 1)) * r.width;
        const py = r.height - (p.n / max) * (r.height - 10) - 4;
        dot.style.left = px + 'px'; dot.style.top = py + 'px'; dot.style.opacity = 1;
        tip.style.left = px + 'px'; tip.style.top = py + 'px'; tip.style.opacity = 1;
        tip.innerHTML = `<b>${fmt(p.n)}</b> <span>· ${esc(p.d.slice(5))}</span>`;
      });
      box.addEventListener('mouseleave', () => { dot.style.opacity = 0; tip.style.opacity = 0; });
    }

    function kpi(label, value, sub, accent) {
      return `<div class="card kpi"><div class="kpi-label">${esc(label)}</div>
        <div class="kpi-value${accent ? ' accent' : ''}">${value}</div>
        ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}</div>`;
    }

    function barRow(label, value, max, color, suffix) {
      const w = max > 0 ? Math.max(2, Math.round((value / max) * 100)) : 0;
      return `<div class="bar-row">
        <div class="bar-label">${esc(label)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color}"></div></div>
        <div class="bar-val">${fmt(value)}${suffix || ''}</div>
      </div>`;
    }

    async function load() {
      app.innerHTML = `<div class="an-state"><div class="icon">📊</div>Loading analytics…</div>`;
      let d;
      try {
        d = await getAnalytics();
      } catch (err) {
        const admin = !/admin/i.test(err.message);
        app.innerHTML = `<div class="an-state"><div class="icon">🔒</div>
          ${/403|admin/i.test(err.message)
            ? "This dashboard is for admins only. Ask an admin to grant your account access."
            : esc(err.message)}</div>`;
        return;
      }
      render(d);
    }

    function render(d) {
      document.getElementById('genAt').textContent =
        'Updated ' + new Date(d.generatedAt).toLocaleString();
      const o = d.overview, a = d.activation, r = d.retention, h = d.habit, rt = d.ratings;
      const charts = [];
      const out = [];

      // ── Top-line KPIs ──
      out.push(`<div class="an-grid cols-6">
        ${kpi('Total users', fmt(o.users), `+${fmt(d.signups.last7d)} this week`)}
        ${kpi('Active today', fmt(o.active_today), `${fmt(o.active_7d)} this week`)}
        ${kpi('Couples', fmt(o.couples), 'accepted pairs')}
        ${kpi('Moments', fmt(o.moments), `${fmt(h.moments_photo)} photo · ${fmt(h.moments_video)} video`)}
        ${kpi('Reviews', fmt(o.reviews), `${fmt(o.comments)} comments`)}
        ${kpi('Activation', pct(a.activation_rate_pct), 'signed up → paired', true)}
      </div>`);

      // ── Growth (30-day series). SVG presentation attributes don't resolve
      //    CSS var(), so charts get resolved hex; style-attribute bars keep var(). ──
      const cPurple = getColor('--c-purple'), cSky = getColor('--c-sky'), cPink = getColor('--c-pink');
      out.push(`<div class="an-section-title">Growth · last 30 days</div>`);
      const sTotal = (s) => s.reduce((t, p) => t + p.n, 0);
      out.push(`<div class="an-grid cols-3">
        <div class="card chart-card"><h3>New signups</h3><div class="chart-total">${fmt(sTotal(d.series.signups))} in 30 days</div>${areaChart('signups', d.series.signups, cPurple)}</div>
        <div class="card chart-card"><h3>Active users</h3><div class="chart-total">peak ${fmt(Math.max(...d.series.active.map((p) => p.n)))}/day</div>${areaChart('active', d.series.active, cSky)}</div>
        <div class="card chart-card"><h3>Moments captured</h3><div class="chart-total">${fmt(sTotal(d.series.moments))} in 30 days</div>${areaChart('moments', d.series.moments, cPink)}</div>
      </div>`);
      charts.push(['signups', d.series.signups, cPurple]);
      charts.push(['active', d.series.active, cSky]);
      charts.push(['moments', d.series.moments, cPink]);

      // ── Watch time (time couples spend together) ──
      const wt = d.watch || {};
      const cAmber = getColor('--c-amber');
      out.push(`<div class="an-section-title">Watch time · time together</div>
        <div class="an-grid cols-4">
          ${kpi('Total watch time', `${fmt(wt.total_hours)}<span style="font-size:15px"> h</span>`, `${fmt(wt.sessions_ended)} sessions ended`, true)}
          ${kpi('Avg session', `${fmt(wt.avg_session_min)}<span style="font-size:15px"> min</span>`, 'mean length')}
          ${kpi('Median session', `${fmt(wt.median_session_min)}<span style="font-size:15px"> min</span>`, 'typical length')}
          ${kpi('Sessions ended', fmt(wt.sessions_ended), 'measured to completion')}
        </div>
        <div class="an-grid" style="grid-template-columns:1fr;margin-top:14px">
          <div class="card chart-card"><h3>Watch minutes per day</h3><div class="chart-total">last 30 days</div>${areaChart('watch', d.series.watch_minutes, cAmber)}</div>
        </div>`);
      charts.push(['watch', d.series.watch_minutes, cAmber]);

      // ── Activation funnel ──
      const fSteps = [
        ['Signed up', a.accounts], ['Invited a partner', a.invited_a_partner],
        ['Partner accepted', a.partner_accepted], ['Captured a moment', a.captured_a_moment],
        ['Wrote a review', a.wrote_a_review],
      ];
      const fMax = fSteps[0][1] || 1;
      out.push(`<div class="an-section-title">Activation funnel</div>
        <div class="card">${fSteps.map(([l, v]) =>
          barRow(l, v, fMax, 'linear-gradient(90deg, var(--c-purple), var(--c-pink))',
            ` <small>${fMax ? Math.round((v / fMax) * 100) : 0}%</small>`)).join('')}</div>`);

      // ── Retention ──
      out.push(`<div class="an-section-title">Retention &amp; engagement</div>
        <div class="an-grid cols-4">
          ${kpi('DAU', fmt(r.dau), 'active today')}
          ${kpi('WAU', fmt(r.wau), 'active this week')}
          ${kpi('MAU', fmt(r.mau), 'active this month')}
          ${kpi('Stickiness', pct(r.dau_wau_pct), 'DAU / WAU', true)}
        </div>
        <div class="an-grid cols-2" style="margin-top:14px">
          <div class="card">
            <div class="stat-line"><span class="sl-label">Returning users (2+ days)</span><span class="sl-value">${fmt(r.returning_users)}</span></div>
            <div class="stat-line"><span class="sl-label">Return rate</span><span class="sl-value">${pct(r.return_rate_pct)}</span></div>
            <div class="stat-line"><span class="sl-label">Ever-active users</span><span class="sl-value">${fmt(r.active_users)}</span></div>
            <div class="stat-line"><span class="sl-label">Moments per capturing user</span><span class="sl-value">${fmt(h.moments_per_capturing_user)}</span></div>
          </div>
          <div class="card">
            <div class="stat-line"><span class="sl-label">💜 Likes</span><span class="sl-value">${fmt(h.likes)}</span></div>
            <div class="stat-line"><span class="sl-label">💬 Comments</span><span class="sl-value">${fmt(h.comments)}</span></div>
            <div class="stat-line"><span class="sl-label">📤 Shares</span><span class="sl-value">${fmt(h.shares)}</span></div>
            <div class="stat-line"><span class="sl-label">✨ Recaps generated</span><span class="sl-value">${fmt(h.recaps_generated)}</span></div>
          </div>
        </div>`);

      // ── Are they coming back? (returning users + engagement depth) ──
      const rr = d.returning || {};
      const ad = rr.active_days || {};
      const adMax = Math.max(1, ...Object.values(ad));
      out.push(`<div class="an-section-title">Are they coming back?</div>
        <div class="an-grid cols-4">
          ${kpi('Returning this week', fmt(rr.returning_active_7d), `${fmt(rr.new_active_7d)} new this week`, true)}
          ${kpi('Week-over-week', pct(rr.wow_retention_pct), `${fmt(rr.prior_week_active)} came back of last week's`)}
          ${kpi('Survived week 1', pct(rr.survived_week1_pct), `of ${fmt(rr.week1_cohort)} past their 1st week`)}
          ${kpi('Watch / active user', `${fmt((d.watch || {}).per_active_user_min)}<span style="font-size:15px"> min</span>`, 'per monthly-active user')}
        </div>
        <div class="an-grid cols-2" style="margin-top:14px">
          <div class="card"><h3 style="font-size:14px;margin-bottom:12px">Engagement depth · distinct active days per user</h3>
            ${['1 day', '2–3 days', '4–7 days', '8+ days'].map((b, i) =>
              barRow(b, ad[b] || 0, adMax, ['var(--c-pink)', 'var(--c-amber)', 'var(--c-sky)', 'var(--c-purple)'][i])).join('')}
          </div>
          <div class="card"><h3 style="font-size:14px;margin-bottom:12px">This week's active users</h3>
            ${barRow('🔁 Returning', rr.returning_active_7d, Math.max(1, rr.returning_active_7d + rr.new_active_7d), 'var(--c-purple)')}
            ${barRow('✨ New', rr.new_active_7d, Math.max(1, rr.returning_active_7d + rr.new_active_7d), 'var(--c-sky)')}
            <div class="stat-line" style="margin-top:8px"><span class="sl-label">Returning share</span><span class="sl-value">${pct(rr.returning_active_7d + rr.new_active_7d > 0 ? Math.round((rr.returning_active_7d / (rr.returning_active_7d + rr.new_active_7d)) * 1000) / 10 : 0)}</span></div>
          </div>
        </div>`);

      // ── Content: photos vs videos, ratings ──
      const cMax = Math.max(h.moments_photo, h.moments_video, 1);
      const rMax = Math.max(1, ...Object.values(rt.distribution));
      out.push(`<div class="an-section-title">Content</div>
        <div class="an-grid cols-2">
          <div class="card"><h3 style="font-size:14px;margin-bottom:12px">Moment types</h3>
            ${barRow('📷 Photos', h.moments_photo, cMax, 'var(--c-sky)')}
            ${barRow('🎥 Videos', h.moments_video, cMax, 'var(--c-purple)')}
            ${barRow('📝 Reviews', h.reviews, Math.max(cMax, h.reviews), 'var(--c-amber)')}
            ${barRow('🎬 Sessions', h.watch_sessions_started, Math.max(cMax, h.watch_sessions_started), 'var(--c-green)')}
          </div>
          <div class="card"><h3 style="font-size:14px;margin-bottom:12px">Ratings · avg ${rt.average || 0} ⭐ (${fmt(rt.count)})</h3>
            ${[5, 4, 3, 2, 1].map((star) => barRow(`${star} ★`, rt.distribution[star] || 0, rMax, 'var(--c-amber)')).join('')}
          </div>
        </div>`);

      // ── Invites + signups by provider ──
      const inv = d.invites;
      const prov = d.signups.by_provider || {};
      const provMax = Math.max(1, ...Object.values(prov));
      out.push(`<div class="an-section-title">Acquisition</div>
        <div class="an-grid cols-3">
          ${kpi('Invites sent', fmt(inv.sent), `${fmt(inv.pending)} pending`)}
          ${kpi('Invites accepted', fmt(inv.accepted), 'partner showed up')}
          ${kpi('Accept rate', pct(inv.accept_rate_pct), 'of invites sent', true)}
        </div>
        <div class="an-grid cols-2" style="margin-top:14px">
          <div class="card"><h3 style="font-size:14px;margin-bottom:12px">Signups by method</h3>
            ${Object.keys(prov).length
              ? Object.entries(prov).map(([k, v]) => barRow(k === 'google' ? 'Google' : 'Email/password', v, provMax, k === 'google' ? 'var(--c-sky)' : 'var(--c-purple)')).join('')
              : '<div class="sl-label">No signups yet.</div>'}
          </div>
          <div class="card"><h3 style="font-size:14px;margin-bottom:12px">Email verification</h3>
            <div class="stat-line"><span class="sl-label">Verified emails</span><span class="sl-value">${fmt(d.verification.verified)} / ${fmt(d.verification.ofEmailAccounts)}</span></div>
            <div class="stat-line"><span class="sl-label">Verification rate</span><span class="sl-value">${pct(d.verification.rate_pct)}</span></div>
            <div class="stat-line"><span class="sl-label">Accounts deleted</span><span class="sl-value">${fmt(d.lifecycle.deletions)}</span></div>
          </div>
        </div>`);

      // ── Raw event breakdown ──
      const ev = d.events || {};
      const evEntries = Object.entries(ev).sort((x, y) => y[1] - x[1]);
      const evMax = Math.max(1, ...evEntries.map((e) => e[1]));
      if (evEntries.length) {
        out.push(`<div class="an-section-title">All tracked events</div>
          <div class="card">${evEntries.map(([k, v]) => barRow(k, v, evMax, 'var(--c-purple)')).join('')}</div>`);
      }

      app.innerHTML = out.join('');
      charts.forEach(([id, s, c]) => wireChart(id, s, c));
    }

    // Resolve a CSS var to its hex so the chart dot/JS can use it.
    function getColor(v) {
      return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || '#8b5cf6';
    }

    load();
  })();
  </script>
</body>
</html>
