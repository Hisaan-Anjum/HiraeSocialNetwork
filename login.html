<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="herae-memories-site" content="1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log In — Herae Memories</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <a href="index.html" class="login-back">← Back</a>
      <img src="logo.png" alt="Herae" class="login-logo">
      <div class="login-title">Herae Memories</div>
      <div class="login-sub">The little moments you've saved together</div>

      <form id="loginForm">
        <!-- Hidden in production: the site is served by the API server, so the
             address is just this page's origin (see api.js getSavedServerUrl and
             the hide logic in src/pages/login.js). Shown only for file:// or a
             localhost dev server, where the origin can't be used. -->
        <div class="field" id="serverUrlField">
          <label for="serverUrl">Server address</label>
          <input type="text" id="serverUrl" placeholder="http://localhost:8080" autocomplete="off">
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="your Herae username" autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%">Log In</button>
        <div class="error-text" id="errorText"></div>
      </form>

      <div class="login-hint">
        <a href="forgot.html">Forgot your password?</a>
      </div>
      <div class="login-hint">
        New to Herae? <a href="signup.html">Create an account</a>
      </div>
      <div class="login-hint">
        Same account you use in the Herae extension.
      </div>
      <div class="login-hint login-legal">
        By continuing you agree to our
        <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="pw-toggle.js"></script>
  <script type="module" src="/src/pages/login.js"></script>
</body>
</html>
