<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="hirae-memories-site" content="1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hirae Memories</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <div>
      <div class="brand">💜 Hirae Memories</div>
      <div class="brand-sub">Every moment you've captured together</div>
    </div>
    <nav class="nav-links">
      <a href="memories.html" class="nav-link nav-link-active">Feed</a>
      <a href="contacts.html" class="nav-link">Contacts</a>
    </nav>
    <div class="topbar-right">
      <span class="who" id="whoAmI"></span>
      <button class="btn btn-ghost" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="page-title">Your memories</div>
    <div class="page-sub">Collages you've saved during watch-together sessions, and the reviews left on them.</div>

    <div class="feed-tabs">
      <button class="feed-tab feed-tab-active" data-tab="feed">🌍 Feed</button>
      <button class="feed-tab" data-tab="mine">✨ Just Mine</button>
    </div>

    <div id="content">
      <div class="spinner-text">Loading your memories…</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="postcard.js"></script>
  <script src="memories.js"></script>
</body>
</html>
