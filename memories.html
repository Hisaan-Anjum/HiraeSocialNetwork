<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="herae-memories-site" content="1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Herae Memories</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <a class="brand-link" href="memories.html" aria-label="Herae Memories — home">
      <img src="logo.png" alt="Herae" class="brand-logo">
      <span class="brand-sub">Every moment you've captured together</span>
    </a>
    <nav class="nav-links">
      <a href="memories.html" class="nav-link nav-link-active">Feed</a>
      <a href="contacts.html" class="nav-link">Contacts</a>
    </nav>
    <div class="topbar-right">
      <button class="btn btn-ghost" id="searchTrigger" aria-label="Search">🔍 Search</button>
      <span class="who" id="whoAmI"></span>
      <button class="btn btn-ghost" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div class="page-wrap">
    <div id="myProfilePanel"></div>
    <div id="feedHero"></div>

    <div class="feed-header-row">
      <div>
        <div class="page-title">Your memories</div>
        <div class="page-sub">Whole watch-sessions, the reviews left on them, and a few things you might want to watch next.</div>
      </div>
      <div class="feed-tabs">
        <button class="feed-scope-tab feed-scope-tab-active" data-scope="everyone">🌍 Everyone</button>
        <button class="feed-scope-tab" data-scope="mine">✨ Just Mine</button>
      </div>
    </div>

    <div id="content" class="feed-list">
      <div class="spinner-text">Loading your memories…</div>
    </div>
    <div id="scrollSentinel" class="scroll-sentinel"></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script type="module" src="/src/pages/memories.js"></script>
</body>
</html>
