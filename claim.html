<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="herae-memories-site" content="1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join Herae Together — Herae</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
<style>
  .claim-wrap { max-width: 460px; margin: 0 auto; padding: 48px 16px; text-align: center; }
  .claim-card { border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 30px 24px;
    background: rgba(255,255,255,0.03); }
  .claim-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .claim-card p { color: var(--ink-dim); font-size: 14px; line-height: 1.5; margin: 0 0 18px; }
  .claim-card .btn { width: 100%; }
</style>
</head>
<body>
  <div class="claim-wrap">
    <img src="logo.png" alt="Herae" class="login-logo" style="margin:0 auto 20px">
    <div class="claim-card">
      <div id="state"><div class="claim-title">Activating your invite…</div><p>One moment 💛</p></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
  'use strict';
  function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  const state = document.getElementById('state');
  const token = new URLSearchParams(location.search).get('token');

  // requireAuth() sends a not-logged-in visitor to log in (or sign up) first,
  // remembering this page — so a brand-new account lands right back here and
  // the reserved seat activates automatically. No code, no support.
  const auth = requireAuth();

  (async () => {
    if (!token) { state.innerHTML = '<div class="claim-title">Invalid invite</div><p>This invite link is missing its code.</p><a class="btn btn-ghost" href="memories.html">Go to Herae</a>'; return; }
    try {
      const r = await apiRequest('/api/subscription/covered/claim', { method: 'POST', body: JSON.stringify({ token }) });
      state.innerHTML = '<div class="claim-title">💛 You\'re covered!</div><p><strong>' + esc(r.owner) + '</strong> added you to Herae Together. Unlimited movie nights, calls and memories are now active for both of you.</p><a class="btn btn-primary" href="memories.html">Open Herae</a>';
    } catch (e) {
      state.innerHTML = '<div class="claim-title">This invite can\'t be used</div><p>' + esc(e.message || 'The invite is no longer valid.') + '</p><a class="btn btn-ghost" href="memories.html">Go to Herae</a>';
    }
  })();
  </script>
</body>
</html>
